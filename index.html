<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Exoplanet Signal Radar</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #030816; /* 深色宇宙背景 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 360px;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            pointer-events: none; /* 讓滑鼠事件穿透到 3D 場景 */
        }
        #right-ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 360px;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            pointer-events: none;
            overflow-y: auto;
            padding-right: 4px;
        }
        .glass-panel {
            background: rgba(16, 24, 48, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            color: #e2e8f0;
            pointer-events: auto; /* 恢復 UI 元件的滑鼠事件 */
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .panel-title {
            margin: 0 0 14px 0;
            font-size: 1rem;
            color: #fff;
            letter-spacing: 0;
            font-weight: 700;
        }
        h1 { margin: 0 0 16px 0; font-size: 1.3rem; font-weight: 600; letter-spacing: 1px; color: #fff; }
        select {
            width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.3); color: white;
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; outline: none; margin-bottom: 15px;
            font-size: 0.95rem; cursor: pointer;
        }
        select option { background: #1a202c; }
        .nav-link {
            display: block;
            margin-top: 12px;
            padding: 10px 12px;
            text-align: center;
            color: #bae6fd;
            text-decoration: none;
            border: 1px solid rgba(125, 211, 252, 0.35);
            border-radius: 8px;
            background: rgba(14, 116, 144, 0.18);
            font-size: 0.86rem;
            font-weight: 700;
        }
        .nav-link:hover {
            background: rgba(14, 116, 144, 0.34);
            color: #ffffff;
        }
        
        .planet-list {
            flex-grow: 1; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; gap: 10px;
            padding-right: 8px;
        }
        /* 自訂卷軸 */
        .planet-list::-webkit-scrollbar { width: 6px; }
        .planet-list::-webkit-scrollbar-track { background: transparent; }
        .planet-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .planet-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        
        .planet-item {
            padding: 12px 16px; background: rgba(255, 255, 255, 0.04); border-radius: 10px; cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .planet-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(4px); }
        .planet-item.active { background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.4); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        
        .planet-name { font-weight: 600; font-size: 1.05rem; color: #fff; }
        .planet-dist { font-size: 0.85rem; color: #94a3b8; margin-top: 6px; }
        .habitable-badge { color: #22c55e; font-size: 0.8rem; margin-left: 6px; font-weight: bold; }
        
        #info-panel { display: none; order: -1; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px;}
        .info-label { color: #94a3b8; }
        .info-value { font-weight: 600; text-align: right; color: #e2e8f0; }
        .kardashev-badge {
            display: inline-flex;
            align-items: center;
            margin-left: 6px;
            padding: 2px 7px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #020617;
            vertical-align: middle;
        }
        .evidence-panel h2 {
            margin: 0 0 12px 0;
            font-size: 1rem;
            color: #fff;
            letter-spacing: 0;
        }
        .evidence-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .metric-box {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            background: rgba(2, 6, 23, 0.28);
            min-width: 0;
        }
        .metric-value {
            font-size: 1.15rem;
            font-weight: 700;
            color: #f8fafc;
            white-space: nowrap;
        }
        .metric-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .control-row { margin: 12px 0; }
        .control-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.78rem;
            color: #cbd5e1;
            margin-bottom: 7px;
        }
        .control-head strong {
            color: #f8fafc;
            font-weight: 700;
            text-align: right;
            white-space: nowrap;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #38bdf8;
        }
        .funnel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        .funnel-row {
            display: grid;
            grid-template-columns: 92px 1fr 48px;
            gap: 8px;
            align-items: center;
            font-size: 0.76rem;
            color: #cbd5e1;
        }
        .funnel-track {
            height: 8px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.18);
            overflow: hidden;
        }
        .funnel-fill {
            height: 100%;
            width: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, #38bdf8, #22c55e);
            transition: width 0.3s ease;
        }
        .legend-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 10px;
            margin-top: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.76rem;
            color: #cbd5e1;
            min-width: 0;
        }
        .legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex: 0 0 auto;
            box-shadow: 0 0 8px currentColor;
        }
        .bias-note {
            margin-top: 12px;
            color: #fbbf24;
            font-size: 0.82rem;
            line-height: 1.45;
        }
        
        .nasa-btn {
            display: block;
            margin-top: 15px;
            padding: 10px 15px;
            text-align: center;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            text-decoration: none;
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.1);
        }
        .nasa-btn:hover {
            background: rgba(56, 189, 248, 0.25);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
            color: #fff;
        }

        #timeline-layer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 800px;
            pointer-events: none;
            z-index: 100;
        }
        #timeline-panel {
            margin-bottom: 0;
            text-align: center;
            background: rgba(16, 24, 48, 0.6);
            padding: 20px 30px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        #timeline-title {
            font-size: 0.9rem;
            color: #38bdf8;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        #timeline-content {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #e2e8f0;
            min-height: 55px; /* keep height stable during typing */
        }
        #timeline-bar-outer {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 70px;
            margin-top: 35px;
        }
        #timeline-bar-inner {
            width: 300%;
            height: 100%;
            position: absolute;
            left: 50%;
            transition: transform 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .time-axis {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.2);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .earth-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            box-shadow: 0 0 5px #94a3b8;
        }
        .earth-marker-year {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #94a3b8;
            white-space: nowrap;
        }
        .earth-marker-name {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #e2e8f0;
            white-space: nowrap;
        }
        .timeline-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .marker-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fbbf24;
            box-shadow: 0 0 10px #fbbf24;
            border: 2px solid #030816;
        }
        #opponent-label-top {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #fbbf24;
            white-space: nowrap;
            font-weight: 600;
        }
        #label-marker-tech {
            margin-top: 22px;
            font-size: 0.8rem;
            color: #fbbf24;
            white-space: nowrap;
            font-weight: bold;
        }

        /* Loading Screen */
        #loading {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #030816; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 1.5rem; z-index: 1000;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="loading">載入星體資料中... Loading...</div>

    <div id="ui-layer">
        <div class="glass-panel">
            <h1 id="title-text">系外行星射電訊號偵測</h1>
            <div id="premise-text" style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px; line-height: 1.4;"></div>
            <select id="lang-select">
                <option value="zh">繁體中文</option>
                <option value="en">English (US)</option>
                <option value="ja">日本語</option>
            </select>
            <a class="nav-link" id="lab-link" href="selection-bias-lab.html">Open Selection Bias Lab</a>
        </div>
        
        <div class="glass-panel planet-list" id="planet-list">
            <!-- List will be populated by JS -->
        </div>
    </div>

    <div id="right-ui-layer">
        <div class="glass-panel evidence-panel" id="evidence-panel">
            <h2 id="evidence-title">Selection Bias Evidence</h2>
            <div class="evidence-grid">
                <div class="metric-box">
                    <div class="metric-value" id="metric-detectable">-</div>
                    <div class="metric-label" id="metric-detectable-label">可偵測候選</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="metric-radius">-</div>
                    <div class="metric-label" id="metric-radius-label">偵測半徑</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="metric-mundane">-</div>
                    <div class="metric-label" id="metric-mundane-label">平庸文明可見</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="metric-selected-class">-</div>
                    <div class="metric-label" id="metric-selected-label">目前目標門檻</div>
                </div>
            </div>

            <div class="control-row">
                <div class="control-head"><span id="label-transmitter">假設發射功率</span><strong id="value-transmitter">10^14 W</strong></div>
                <input id="transmitter-slider" type="range" min="12" max="26" step="0.25" value="14">
            </div>
            <div class="control-row">
                <div class="control-head"><span id="label-sensitivity">接收靈敏度增益</span><strong id="value-sensitivity">1x</strong></div>
                <input id="sensitivity-slider" type="range" min="0" max="6" step="0.25" value="0">
            </div>
            <div class="control-row">
                <div class="control-head"><span id="label-lead">平庸文明領先年數</span><strong id="value-lead">100 年</strong></div>
                <input id="lead-slider" type="range" min="25" max="1000" step="25" value="100">
            </div>

            <div class="funnel" aria-label="SETI threshold funnel">
                <div class="funnel-row"><span id="funnel-total-label">全部目標</span><div class="funnel-track"><div class="funnel-fill" id="funnel-total"></div></div><strong id="funnel-total-value">-</strong></div>
                <div class="funnel-row"><span id="funnel-time-label">時間可行</span><div class="funnel-track"><div class="funnel-fill" id="funnel-time"></div></div><strong id="funnel-time-value">-</strong></div>
                <div class="funnel-row"><span id="funnel-energy-label">能量可達</span><div class="funnel-track"><div class="funnel-fill" id="funnel-energy"></div></div><strong id="funnel-energy-value">-</strong></div>
                <div class="funnel-row"><span id="funnel-both-label">同時通過</span><div class="funnel-track"><div class="funnel-fill" id="funnel-both"></div></div><strong id="funnel-both-value">-</strong></div>
            </div>

            <div class="legend-list" id="kardashev-legend"></div>
            <div class="bias-note" id="bias-note"></div>
        </div>

        <div class="glass-panel" id="info-panel">
            <h2 class="panel-title" id="target-panel-title">Selected Target Diagnostics</h2>
            <div class="info-row"><span class="info-label" id="label-name">名稱</span><span class="info-value" id="val-name">-</span></div>
            <div class="info-row"><span class="info-label" id="label-host">恆星</span><span class="info-value" id="val-host">-</span></div>
            <div class="info-row"><span class="info-label" id="label-dist">距離</span><span class="info-value" id="val-dist">-</span></div>
            <div class="info-row"><span class="info-label" id="label-signal">訊號發出年份</span><span class="info-value" id="val-signal">-</span></div>
            <div class="info-row" style="border:none;"><span class="info-label" id="label-power">所需功率</span><span class="info-value" id="val-power">-</span></div>
            
            <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px;">
                <div style="height: 160px; width: 100%;">
                    <canvas id="power-chart"></canvas>
                </div>
                <div id="eval-text" style="font-size: 0.85rem; margin-top: 15px; line-height: 1.5; font-weight: 500;"></div>
                <a id="nasa-link" class="nasa-btn" href="#" target="_blank" rel="noopener noreferrer" style="display: none;">🔗 深入探索 (NASA 官方資料)</a>
            </div>
        </div>
    </div>

    <div id="timeline-layer">
        <div id="timeline-panel">
            <div id="timeline-title">當此訊號發射時的地球...</div>
            <div id="timeline-content"></div>
            
            <div id="timeline-bar-container" style="display: none; margin-bottom: 5px;">
                <div id="timeline-bar-outer">
                    <div id="timeline-bar-inner">
                        <div class="time-axis"></div>
                        <!-- Earth Milestones dynamically generated -->
                        <div id="marker-tech" class="timeline-marker" style="left: 50%; z-index: 10;">
                            <div id="opponent-label-top">對方所需技術</div>
                            <div class="marker-dot"></div>
                            <div id="label-marker-tech"></div>
                        </div>
                    </div>
                </div>
                <div id="timeline-countdown" style="margin-top: 15px; font-size: 0.95rem; color: #fbbf24; font-weight: 500;"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

            element.innerHTML = '';

            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    typewriterTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        function estimateYear(reqPower) {
            if (reqPower <= earthHistory[0].power) return earthHistory[0].year;
            if (reqPower >= earthHistory[earthHistory.length - 1].power) return "BEYOND";
            
            for (let i = 0; i < earthHistory.length - 1; i++) {
                const p1 = earthHistory[i];
                const p2 = earthHistory[i + 1];
                if (reqPower >= p1.power && reqPower <= p2.power) {
                    const logReq = Math.log10(reqPower);
                    const logP1 = Math.log10(p1.power);
                    const logP2 = Math.log10(p2.power);
                    const ratio = (logReq - logP1) / (logP2 - logP1);
                    return Math.round(p1.year + ratio * (p2.year - p1.year));
                }
            }
            return 2026;
        }

                    ],

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            scene.add(galaxyCoreGlow);

            // Earth
            const earthGroup = new THREE.Group();
            scene.add(earthGroup);

            const earthGeo = new THREE.SphereGeometry(3, 32, 32);
            const earthMat = new THREE.MeshPhongMaterial({ 
                color: 0x1177ff, 
                emissive: 0x0033aa,
                shininess: 80
            });
            const earth = new THREE.Mesh(earthGeo, earthMat);
            earthGroup.add(earth);
            
            // Earth glow
            const glowGeo = new THREE.SphereGeometry(3.6, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
            const earthGlow = new THREE.Mesh(glowGeo, glowMat);
            earthGroup.add(earthGlow);

            const kardashevClasses = [
                { id: 'earth', label: 'Earth', labelZh: '地球級', labelJa: '地球級', maxPower: 1e14, color: 0x38bdf8, css: '#38bdf8' },
                { id: 'type1', label: 'Type I', labelZh: '第一型', labelJa: 'タイプI', maxPower: 1e16, color: 0x22c55e, css: '#22c55e' },
                { id: 'interstellar', label: 'Interstellar', labelZh: '星際級', labelJa: '恒星間級', maxPower: 1e20, color: 0xfbbf24, css: '#fbbf24' },
                { id: 'type2', label: 'Type II+', labelZh: '第二型+', labelJa: 'タイプII+', maxPower: Infinity, color: 0xf97316, css: '#f97316' }
            ];

            function getKardashevClass(power) {
                return kardashevClasses.find(item => power <= item.maxPower) || kardashevClasses[kardashevClasses.length - 1];
            }

            function getKardashevLabel(item, lang = currentLang) {
                if (lang === 'zh') return item.labelZh;
                if (lang === 'ja') return item.labelJa;
                return item.label;
            }

            function getDetectionModel() {
                const transmitterPower = Math.pow(10, Number(transmitterSlider.value));
                const sensitivityGain = Math.pow(10, Number(sensitivitySlider.value));
                const leadYears = Number(leadSlider.value);
                const effectivePower = transmitterPower * sensitivityGain;
                // FAST-baseline conceptual EIRP threshold coefficient (W / ly^2).
                const radiusLy = Math.sqrt(effectivePower / 1.12e11);
                return { transmitterPower, sensitivityGain, leadYears, effectivePower, radiusLy };
            }

            const detectionShellGeo = new THREE.SphereGeometry(1, 48, 24);
            const detectionShellMat = new THREE.MeshBasicMaterial({
                color: 0x38bdf8,
                transparent: true,
                opacity: 0.055,
                wireframe: true,
                depthWrite: false
            });
            const detectionShell = new THREE.Mesh(detectionShellGeo, detectionShellMat);
            scene.add(detectionShell);

            // Planets mapping
            const planetMeshes = [];
            const planetColor = new THREE.Color();
            
            data.forEach((p, index) => {
                // 判斷是否為宜居行星
                p.isHabitable = /Proxima Cen|TRAPPIST-1|LHS 1140|Kepler-186 f/i.test(p.pl_name) || /Proxima Cen/i.test(p.hostname);
                
                // 設定 NASA URL
                const matchObj = nasaUrls.find(n => n.match.test(p.pl_name) || n.match.test(p.hostname));
                if (matchObj) {
                    p.nasaUrl = matchObj.url;
                }

                // 對數映射距離: 確保能裝下 4~1400 甚至更遠的距離 (light year)
                const logDist = Math.log10(Math.max(p.distance_ly, 1));
                const r = logDist * 90; // 將對數數值放大至 3D 空間半徑

                // Random spherical coordinates
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                p.kardashevClass = getKardashevClass(p.required_power_w);
                planetColor.setHex(p.kardashevClass.color);

                // Planet Group
                const pGroup = new THREE.Group();
                pGroup.position.set(x, y, z);
                
                // Planet Sphere
                const pGeo = new THREE.SphereGeometry(p.isHabitable ? 1.6 : 1.2, 16, 16);
                const pMat = new THREE.MeshPhongMaterial({ 
                    color: planetColor.getHex(),
                    emissive: planetColor.getHex(),
                    emissiveIntensity: 0.5,
                    transparent: true,
                    opacity: 1
                });
                const pMesh = new THREE.Mesh(pGeo, pMat);
                pMesh.userData = { ...p, index: index, originalColor: planetColor.getHex() };
                pGroup.add(pMesh);

                // Planet Glow
                const pGlowGeo = new THREE.SphereGeometry(p.isHabitable ? 2.5 : 1.8, 16, 16);
                const pGlowMat = new THREE.MeshBasicMaterial({ 
                    color: planetColor.getHex(), 
                    transparent: true, 
                    opacity: p.isHabitable ? 0.5 : 0.2, 
                    blending: THREE.AdditiveBlending 
                });
                pGroup.add(new THREE.Mesh(pGlowGeo, pGlowMat));
                
                // 若為宜居，增加閃爍特效的參考
                if (p.isHabitable) {
                    pGroup.userData.isHabitable = true;
                    pGroup.userData.glowMesh = pGroup.children[1];
                }

                scene.add(pGroup);
                planetMeshes.push({ group: pGroup, mesh: pMesh });
            });

            // Connection Line and Signal Animation
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.6, linewidth: 2 });
            let currentLine = null;
            let signalWave = null;

            // Raycaster for click
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            // Format scientific notation
            function formatPower(power) {
                return power.toExponential(2).replace('e+', ' × 10^');
            }

            // Format year with AD/BC
            function formatYear(year, lang) {
                if (year < 0) {
                    if (lang === 'en') return `BC ${Math.abs(year)}`;
                    if (lang === 'ja') return `紀元前 ${Math.abs(year)} 年`;
                    return `西元前 ${Math.abs(year)} 年`;
                } else {
                    if (lang === 'en') return `AD ${year}`;
                    if (lang === 'ja') return `西暦 ${year} 年`;
                    return `西元 ${year} 年`;
                }
            }

            function formatCompactPower(power) {
                const exponent = Math.log10(power);
                if (!Number.isFinite(exponent)) return '-';
                return `10^${exponent.toFixed(exponent % 1 === 0 ? 0 : 1)} W`;
            }

            function setFunnel(fill, valueEl, count, total) {
                const percent = total > 0 ? Math.max(2, (count / total) * 100) : 0;
                fill.style.width = `${percent}%`;
                valueEl.innerText = count.toString();
            }

            function updateEvidencePanel() {
                const txt = i18n[currentLang];
                const model = getDetectionModel();
                const total = data.length;
                const timeFeasible = data.filter(p => p.distance_ly <= model.leadYears).length;
                const energyFeasible = data.filter(p => p.required_power_w <= model.effectivePower).length;
                const bothFeasible = data.filter(p => p.distance_ly <= model.leadYears && p.required_power_w <= model.effectivePower).length;
                const selectedClass = activeIndex === -1 ? null : data[activeIndex].kardashevClass;

                evidenceTitle.innerText = txt.evidenceTitle;
                metricDetectableLabel.innerText = txt.detectableMetric;
                metricRadiusLabel.innerText = txt.radiusMetric;
                metricMundaneLabel.innerText = txt.mundaneMetric;
                metricSelectedLabel.innerText = txt.selectedMetric;
                labelTransmitter.innerText = txt.transmitter;
                labelSensitivity.innerText = txt.sensitivity;
                labelLead.innerText = txt.lead;
                funnelTotalLabel.innerText = txt.totalTargets;
                funnelTimeLabel.innerText = txt.timePass;
                funnelEnergyLabel.innerText = txt.energyPass;
                funnelBothLabel.innerText = txt.bothPass;
                biasNote.innerText = txt.biasNote;

                metricDetectable.innerText = `${bothFeasible} ${txt.of} ${total}`;
                metricRadius.innerText = `${Math.round(model.radiusLy).toLocaleString()} ${txt.ly}`;
                metricMundane.innerText = `${bothFeasible} ${txt.visible}`;
                metricSelectedClass.innerText = selectedClass ? getKardashevLabel(selectedClass) : '-';

                valueTransmitter.innerText = formatCompactPower(model.transmitterPower);
                valueSensitivity.innerText = `${model.sensitivityGain.toLocaleString(undefined, { maximumFractionDigits: 0 })}x`;
                valueLead.innerText = `${model.leadYears} ${txt.years}`;

                setFunnel(funnelTotal, funnelTotalValue, total, total);
                setFunnel(funnelTime, funnelTimeValue, timeFeasible, total);
                setFunnel(funnelEnergy, funnelEnergyValue, energyFeasible, total);
                setFunnel(funnelBoth, funnelBothValue, bothFeasible, total);

                kardashevLegend.innerHTML = '';
                kardashevClasses.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'legend-item';
                    const swatch = document.createElement('span');
                    swatch.className = 'legend-swatch';
                    swatch.style.background = item.css;
                    swatch.style.color = item.css;
                    const label = document.createElement('span');
                    label.innerText = getKardashevLabel(item);
                    row.appendChild(swatch);
                    row.appendChild(label);
                    kardashevLegend.appendChild(row);
                });

                const shellRadius = Math.max(1, Math.log10(Math.max(model.radiusLy, 1)) * 90);
                detectionShell.scale.setScalar(shellRadius);
                detectionShell.visible = shellRadius > 1;

                planetMeshes.forEach(pm => {
                    const p = pm.mesh.userData;
                    const visibleThroughFilter = p.distance_ly <= model.leadYears && p.required_power_w <= model.effectivePower;
                    const keepSelectedVisible = p.index === activeIndex;
                    const opacity = (visibleThroughFilter || keepSelectedVisible) ? 1 : 0.26;
                    pm.mesh.material.opacity = opacity;
                    pm.mesh.material.emissiveIntensity = visibleThroughFilter ? 0.62 : 0.18;
                    if (pm.group.children[1] && pm.group.children[1].material) {
                        pm.group.children[1].material.opacity = visibleThroughFilter ? (p.isHabitable ? 0.5 : 0.2) : 0.06;
                    }
                });
            }

            // Update UI Text
            function updateUI() {
                const txt = i18n[currentLang];
                document.documentElement.lang = currentLang === 'zh' ? 'zh-TW' : currentLang;
                langSelect.value = currentLang;
                titleText.innerText = txt.title;
                premiseText.innerText = txt.premise;
                labLink.innerText = txt.labLink;
                targetPanelTitle.innerText = txt.targetPanelTitle;
                labelName.innerText = txt.name;
                labelHost.innerText = txt.host;
                labelDist.innerText = txt.dist;
                labelSignal.innerText = txt.signal;
                labelPower.innerText = txt.power;
                
                // Rebuild List
                planetList.innerHTML = '';
                data.forEach((p, index) => {
                    const item = document.createElement('div');
                    item.className = `planet-item ${index === activeIndex ? 'active' : ''}`;
                    item.id = `item-${index}`;
                    
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'planet-name';
                    nameDiv.innerHTML = p.pl_name
                        + `<span class="kardashev-badge" style="background:${p.kardashevClass.css}">${getKardashevLabel(p.kardashevClass)}</span>`
                        + (p.isHabitable ? `<span class="habitable-badge">${txt.habitable}</span>` : "");
                    
                    const distDiv = document.createElement('div');
                    distDiv.className = 'planet-dist';
                    distDiv.innerText = `${p.distance_ly.toFixed(2)} ${txt.ly}`;
                    
                    item.appendChild(nameDiv);
                    item.appendChild(distDiv);
                    
                    item.addEventListener('click', () => selectPlanet(index));
                    planetList.appendChild(item);
                });
                updateEvidencePanel();
            }

            let activeIndex = -1;

            function selectPlanet(index) {
                if(activeIndex !== -1) {
                    const prevItem = document.getElementById(`item-${activeIndex}`);
                    if(prevItem) prevItem.classList.remove('active');
                    planetMeshes[activeIndex].group.scale.set(1, 1, 1);
                    planetMeshes[activeIndex].mesh.material.emissiveIntensity = 0.5;
                }
                
                activeIndex = index;
                const currItem = document.getElementById(`item-${index}`);
                if(currItem) currItem.classList.add('active');
                
                const p = data[index];
                const pObj = planetMeshes[index];
                const txt = i18n[currentLang];

                // Update Info Panel
                infoPanel.style.display = 'block';
                valName.innerHTML = p.pl_name
                    + `<span class="kardashev-badge" style="background:${p.kardashevClass.css}">${getKardashevLabel(p.kardashevClass)}</span>`
                    + (p.isHabitable ? `<span class="habitable-badge">${txt.habitable}</span>` : "");
                valHost.innerText = p.hostname;
                valDist.innerText = `${p.distance_ly.toFixed(2)} ${txt.ly}`;
                valSignal.innerText = formatYear(Math.floor(p.signal_year), currentLang);
                valPower.innerText = formatPower(p.required_power_w) + (currentLang === 'en' ? ' W (J/s)' : (currentLang === 'ja' ? ' W (ジュール/秒)' : ' 瓦特 (焦耳/秒)'));

                // Update Chart Target Line
                const targetData = [
                    { x: 1890, y: p.required_power_w },
                    { x: 2030, y: p.required_power_w }
                ];
                powerChart.data.datasets[1].data = targetData;
                powerChart.update();

                // Evaluate Text
                const eqYear = estimateYear(p.required_power_w);
                if (eqYear === "BEYOND") {
                    evalText.innerText = txt.techBeyond;
                    evalText.style.color = "#ff4444";
                } else {
                    evalText.innerText = txt.techEval1 + formatPower(p.required_power_w) + txt.techEval2 + eqYear + txt.techEval3;
                    evalText.style.color = "#38bdf8";
                }

                // Timeline Event
                timelinePanel.style.display = 'block';
                timelineTitle.innerText = txt.timelineTitle;
                const closestEvent = getTimelineEvent(p.signal_year);
                typeWriter(timelineContent, closestEvent.text[currentLang] || closestEvent.text['zh']);

                // Timeline Progress Bar logic
                const timelineBarContainer = document.getElementById('timeline-bar-container');
                const innerBar = document.getElementById('timeline-bar-inner');
                const opponentLabelTop = document.getElementById('opponent-label-top');
                const labelMarkerTech = document.getElementById('label-marker-tech');
                const timelineCountdown = document.getElementById('timeline-countdown');
                const markerTech = document.getElementById('marker-tech');

                timelineBarContainer.style.display = 'block';
                opponentLabelTop.innerText = txt.markerTech;

                // Render Earth Milestones once if not exists
                if (innerBar.querySelectorAll('.earth-marker').length === 0) {
                    const radioMilestones = [
                        { year: 1895, name: { zh: "馬可尼實驗", en: "Marconi Exp.", ja: "マルコーニ実験" } },
                        { year: 1920, name: { zh: "早期廣播", en: "Early Radio", ja: "初期ラジオ" } },
                        { year: 1950, name: { zh: "早期雷達", en: "Early Radar", ja: "初期レーダー" } },
                        { year: 1974, name: { zh: "阿雷西博", en: "Arecibo", ja: "アレシボ" } },
                        { year: 2026, name: { zh: "深空網路", en: "DSN", ja: "深宇宙ネットワーク" } }
                    ];
                    radioMilestones.forEach(m => {
                        const pos = ((m.year - 1800) / 300) * 100;
                        const marker = document.createElement('div');
                        marker.className = 'earth-marker';
                        marker.style.left = `${pos}%`;
                        const yearLabel = document.createElement('div');
                        yearLabel.className = 'earth-marker-year';
                        yearLabel.innerText = m.year;
                        marker.appendChild(yearLabel);
                        const nameLabel = document.createElement('div');
                        nameLabel.className = 'earth-marker-name';
                        nameLabel.innerText = m.name[currentLang];
                        marker.appendChild(nameLabel);
                        innerBar.appendChild(marker);
                    });
                } else {
                    // Update language for earth markers
                    const radioNames = [
                        { zh: "馬可尼實驗", en: "Marconi Exp.", ja: "マルコーニ実験" },
                        { zh: "早期廣播", en: "Early Radio", ja: "初期ラジオ" },
                        { zh: "早期雷達", en: "Early Radar", ja: "初期レーダー" },
                        { zh: "阿雷西博", en: "Arecibo", ja: "アレシボ" },
                        { zh: "深空網路", en: "DSN", ja: "深宇宙ネットワーク" }
                    ];
                    const nameLabels = innerBar.querySelectorAll('.earth-marker-name');
                    nameLabels.forEach((lbl, idx) => {
                        lbl.innerText = radioNames[idx][currentLang];
                    });
                }

                // Reset animation
                innerBar.style.transition = 'none';
                innerBar.style.transform = `translateX(-50%)`; // default center
                
                setTimeout(() => {
                    innerBar.style.transition = 'transform 2s cubic-bezier(0.22, 1, 0.36, 1)';
                    
                    if (eqYear === "BEYOND") {
                        timelineCountdown.innerText = txt.techBeyondBar;
                        const posPercent = ((2080 - 1800) / 300) * 100; // Cap at 2080 visually
                        markerTech.style.left = `${posPercent}%`;
                        labelMarkerTech.innerText = currentLang === 'zh' ? "未來" : (currentLang === 'ja' ? "未来" : "Future");
                        innerBar.style.transform = `translateX(calc(-${posPercent}%))`;
                    } else {
                        const diffYears = Math.floor(eqYear - p.signal_year);
                        if (diffYears > 0) {
                            timelineCountdown.innerText = txt.techWait1 + eqYear + txt.techWait2 + diffYears + txt.techWait3;
                        } else {
                            timelineCountdown.innerText = txt.techAlready + Math.abs(diffYears) + txt.techAlready2;
                        }
                        const posPercent = ((eqYear - 1800) / 300) * 100;
                        markerTech.style.left = `${posPercent}%`;
                        labelMarkerTech.innerText = `${eqYear} 年`;
                        innerBar.style.transform = `translateX(calc(-${posPercent}%))`;
                    }
                }, 50);

                // NASA Link
                if (p.nasaUrl) {
                    nasaLink.href = p.nasaUrl;
                    nasaLink.innerText = `🔗 深入探索 ${p.pl_name} (NASA 官方資料)`;
                    nasaLink.style.display = 'block';
                } else {
                    nasaLink.style.display = 'none';
                }

                // Highlight planet
                pObj.group.scale.set(1.8, 1.8, 1.8);
                pObj.mesh.material.emissiveIntensity = 1.0;

                // Draw line from Earth to Planet
                if(currentLine) scene.remove(currentLine);
                if(signalWave) scene.remove(signalWave);

                const earthPos = new THREE.Vector3(0,0,0);
                const targetPos = pObj.group.position.clone();
                
                const points = [earthPos, targetPos];
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                currentLine = new THREE.Line(lineGeo, lineMaterial);
                scene.add(currentLine);

                // Animate Signal Wave
                const waveGeo = new THREE.SphereGeometry(1.5, 16, 16);
                const waveMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.8 });
                signalWave = new THREE.Mesh(waveGeo, waveMat);
                signalWave.position.copy(earthPos);
                scene.add(signalWave);

                new TWEEN.Tween(signalWave.position)
                    .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 2000)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onComplete(() => {
                        if(signalWave) scene.remove(signalWave);
                    })
                    .start();

                // Animate Camera Focus
                const camOffset = targetPos.clone().normalize().multiplyScalar(40);
                const newCamPos = targetPos.clone().add(camOffset);
                newCamPos.y += 15;

                new TWEEN.Tween(camera.position)
                    .to({ x: newCamPos.x, y: newCamPos.y, z: newCamPos.z }, 1500)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();

                new TWEEN.Tween(controls.target)
                    .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1500)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
                    
                // Scroll list to item
                if(currItem) currItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                updateEvidencePanel();
            }

            // Listeners
            langSelect.addEventListener('change', (e) => {
                currentLang = e.target.value;
                localStorage.setItem(LANGUAGE_STORAGE_KEY, currentLang);
                updateUI();
                if(activeIndex !== -1) selectPlanet(activeIndex); // Refresh info panel texts
            });
            window.addEventListener('storage', (event) => {
                if (event.key === LANGUAGE_STORAGE_KEY && event.newValue && i18n[event.newValue]) {
                    currentLang = event.newValue;
                    updateUI();
                    if(activeIndex !== -1) selectPlanet(activeIndex);
                }
            });

            [transmitterSlider, sensitivitySlider, leadSlider].forEach(slider => {
                slider.addEventListener('input', updateEvidencePanel);
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // 3D Click Interaction
            window.addEventListener('click', (event) => {
                // Ignore UI clicks (panel width ~ 380px on left and right)
                if(event.clientX < 400 || event.clientX > window.innerWidth - 400) return;

                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const targetMeshes = planetMeshes.map(pm => pm.mesh);
                const intersects = raycaster.intersectObjects(targetMeshes);

                if (intersects.length > 0) {
                    const obj = intersects[0].object;
                    selectPlanet(obj.userData.index);
                }
            });

            // Initialize UI
            updateUI();

            // Animation Loop
            function animate(time) {
                requestAnimationFrame(animate);
                TWEEN.update(time);
                controls.update();
                
                earthGroup.rotation.y += 0.002;
                earthGlow.scale.setScalar(1 + Math.sin(time * 0.002) * 0.05); // Pulsing glow
                farGalaxy.rotation.y += 0.000015;
                lodGalaxy.rotation.y += 0.000025;
                realStarCore.rotation.y += 0.00001;
                galaxyCoreGlow.scale.setScalar(1 + Math.sin(time * 0.0008) * 0.035);

                // 宜居行星閃爍效果
                planetMeshes.forEach(pm => {
                    if (pm.group.userData.isHabitable) {
                        pm.group.userData.glowMesh.scale.setScalar(1 + Math.sin(time * 0.005 + pm.mesh.userData.index) * 0.1);
                    }
                });
                
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
